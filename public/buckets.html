<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buckets — TextApp</title>
  <link rel="stylesheet" href="/css/shared.css?v=2">
  <style>
    .buckets-layout { display:flex; height:calc(100vh - 48px); overflow:hidden; }
    .buckets-sidebar { width:260px; flex-shrink:0; border-right:1px solid var(--color-border); display:flex; flex-direction:column; background:var(--color-surface-subtle); overflow:hidden; }
    .buckets-sidebar-header { padding:12px; border-bottom:1px solid var(--color-border); display:flex; gap:8px; flex-shrink:0; }
    .buckets-tree-scroll { flex:1; overflow-y:auto; padding:8px; }
    .buckets-main { flex:1; overflow-y:auto; padding:24px; }
    .buckets-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; color:var(--color-text-secondary); font-size:14px; gap:8px; }

    /* ── Folder rows ── */
    .tree-folder { display:flex; align-items:center; gap:6px; padding:7px 10px; cursor:pointer; border-radius:var(--radius-sm); font-size:13px; font-weight:600; color:#374151; transition:background 0.12s; user-select:none; margin-bottom:1px; }
    .tree-folder:hover { background:#e9ecef; }
    .tree-folder.selected { background:var(--color-primary-light); color:var(--color-primary); }
    .tree-folder.drag-over { outline:2px dashed #6366f1; background:#eef2ff; }
    .tree-chevron { font-size:10px; color:#9ca3af; transition:transform 0.15s; flex-shrink:0; display:inline-block; width:10px; }
    .tree-chevron.open { transform:rotate(90deg); }
    .folder-badge { background:#e5e7eb; color:#6b7280; border-radius:20px; padding:1px 7px; font-size:11px; font-weight:600; flex-shrink:0; }

    /* ── Bucket rows ── */
    .tree-bucket { display:flex; align-items:center; gap:7px; padding:6px 10px 6px 22px; cursor:pointer; border-radius:var(--radius-sm); font-size:13px; color:#374151; transition:background 0.12s; user-select:none; margin-bottom:1px; }
    .tree-bucket.toplevel { padding-left:10px; }
    .tree-bucket:hover { background:#f1f5f9; }
    .tree-bucket:hover .drag-handle { opacity:1; }
    .tree-bucket.selected { background:var(--color-primary-light); color:var(--color-primary); }
    .tree-bucket.dragging { opacity:0.45; }
    .drag-handle { font-size:13px; color:#9ca3af; opacity:0; cursor:grab; flex-shrink:0; width:14px; text-align:center; }
    .bucket-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .tree-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tree-lead-count { font-size:11px; color:#9ca3af; flex-shrink:0; white-space:nowrap; }

    /* ── Detail panel ── */
    .detail-card { background:white; border:1px solid var(--color-border); border-radius:var(--radius-md); padding:24px; max-width:520px; }
    .detail-title { font-size:17px; font-weight:700; margin-bottom:20px; color:var(--color-text); }
    .color-swatches { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .color-swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:border-color 0.15s, transform 0.1s; }
    .color-swatch:hover { transform:scale(1.1); }
    .color-swatch.selected { border-color:#1e293b; }
    .section-divider { height:1px; background:var(--color-border); margin:16px 0; }
    .bucket-child-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--color-border); font-size:13px; }
    .bucket-child-row:last-child { border-bottom:none; }
  </style>
</head>
<body>
<div id="sidebar-root"></div>
<div class="container">
  <div class="buckets-layout">
    <div class="buckets-sidebar">
      <div class="buckets-sidebar-header">
        <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="openNewFolderModal()" title="Folders organize buckets. They cannot hold leads directly.">📂 + Folder</button>
        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="openNewBucketModal()">● + New Bucket</button>
      </div>
      <div class="buckets-tree-scroll" id="bucket-tree"></div>
    </div>
    <div class="buckets-main">
      <div id="bucket-detail">
        <div class="buckets-empty">
          <div style="font-size:32px;">📂</div>
          <div>Select a bucket or folder to view details</div>
        </div>
      </div>
    </div>
  </div>
</div><!-- .container -->

<!-- NEW FOLDER MODAL -->
<div class="modal-overlay" id="new-folder-modal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h2>New Folder</h2>
      <button class="modal-close" onclick="closeNewFolderModal()">×</button>
    </div>
    <p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 16px;">Folders organize buckets into groups. Leads are stored in buckets, not folders.</p>
    <div class="form-group">
      <label>Folder Name</label>
      <input type="text" id="new-folder-name" placeholder="e.g. March Imports, Bulk Leads..." onkeydown="if(event.key==='Enter')saveNewFolder()">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeNewFolderModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewFolder()">Create Folder</button>
    </div>
  </div>
</div>

<!-- NEW BUCKET MODAL -->
<div class="modal-overlay" id="new-bucket-modal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h2>New Bucket</h2>
      <button class="modal-close" onclick="closeNewBucketModal()">×</button>
    </div>
    <div class="form-group">
      <label>Bucket Name</label>
      <input type="text" id="new-bucket-name" placeholder="e.g. New Leads, My Bucket..." onkeydown="if(event.key==='Enter')saveNewBucket()">
    </div>
    <div class="form-group">
      <label>Add to Folder <span style="color:var(--color-text-secondary);font-weight:400;">(optional)</span></label>
      <select id="new-bucket-folder">
        <option value="">Top level (no folder)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-swatches" id="new-bucket-colors"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeNewBucketModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewBucket()">Create Bucket</button>
    </div>
  </div>
</div>

<script src="/toast.js?v=2"></script>
<script src="/js/shared.js?v=2"></script>
<script>
  const BUCKET_COLORS = ['#6366f1','#8b5cf6','#ec4899','#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#64748b','#1a1a2e']

  let allBuckets = []
  let selectedItemId = null
  let selectedItemType = null
  let newBucketColor = BUCKET_COLORS[0]

  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')

  // ── Folder expand/collapse (localStorage) ────────────────────────────────────
  const isFolderExpanded = (id) => {
    const v = localStorage.getItem('bucket_folder_' + id)
    return v === null ? true : v === 'true'
  }
  const setFolderExpanded = (id, val) => localStorage.setItem('bucket_folder_' + id, val)

  // ── Load ──────────────────────────────────────────────────────────────────────
  const loadBuckets = async () => {
    try {
      const res = await fetch('/buckets')
      const data = await res.json()
      allBuckets = data.buckets || []
      renderTree()
      if (selectedItemId) renderDetail(selectedItemId, selectedItemType)
    } catch (err) {
      console.error('Failed to load buckets:', err)
      toast.error('Error', 'Failed to load buckets')
    }
  }

  // ── Tree rendering ────────────────────────────────────────────────────────────
  const renderTree = () => {
    const container = document.getElementById('bucket-tree')
    if (!container) return

    const folders    = allBuckets.filter(b => b.is_folder)
    const topLevel   = allBuckets.filter(b => !b.is_folder && !b.parent_id && !b.is_system)
    const sysBuckets = allBuckets.filter(b => b.is_system)

    let html = ''

    // 1. Folders with indented child buckets
    for (const folder of folders) {
      const children = allBuckets.filter(b => b.parent_id === folder.id)
      const isSel    = selectedItemId === folder.id && selectedItemType === 'folder'
      const expanded = isFolderExpanded(folder.id)

      html += `<div class="tree-folder${isSel ? ' selected' : ''}" data-folder-id="${folder.id}"
                    onclick="handleFolderClick('${folder.id}')">
        <span class="tree-chevron${expanded ? ' open' : ''}">▶</span>
        <span>📂</span>
        <span class="tree-name">${esc(folder.name)}</span>
        <span class="folder-badge">${children.length}</span>
      </div>
      <div id="fc-${folder.id}"${expanded ? '' : ' style="display:none"'}>`

      for (const b of children) {
        const bSel = selectedItemId === b.id && selectedItemType === 'bucket'
        html += `<div class="tree-bucket${bSel ? ' selected' : ''}" data-bucket-id="${b.id}"
                      onclick="selectItem('${b.id}','bucket')">
          <span class="drag-handle">⠿</span>
          <span class="bucket-dot" style="background:${b.color}"></span>
          <span class="tree-name">${esc(b.name)}</span>
          <span class="tree-lead-count">${b.lead_count ?? 0} leads</span>
        </div>`
      }
      html += `</div>`
    }

    // 2. Orphan buckets (top-level, non-system)
    for (const b of topLevel) {
      const bSel = selectedItemId === b.id && selectedItemType === 'bucket'
      html += `<div class="tree-bucket toplevel${bSel ? ' selected' : ''}" data-bucket-id="${b.id}"
                    onclick="selectItem('${b.id}','bucket')">
        <span class="drag-handle">⠿</span>
        <span class="bucket-dot" style="background:${b.color}"></span>
        <span class="tree-name">${esc(b.name)}</span>
        <span class="tree-lead-count">${b.lead_count ?? 0} leads</span>
      </div>`
    }

    // 3. System buckets last — no drag handle
    for (const b of sysBuckets) {
      const bSel = selectedItemId === b.id && selectedItemType === 'bucket'
      html += `<div class="tree-bucket toplevel${bSel ? ' selected' : ''}" data-bucket-id="${b.id}"
                    onclick="selectItem('${b.id}','bucket')">
        <span style="width:14px;flex-shrink:0;"></span>
        <span class="bucket-dot" style="background:#22c55e"></span>
        <span class="tree-name">🔒 ${esc(b.name)}</span>
        <span class="tree-lead-count">${b.lead_count ?? 0} leads</span>
      </div>`
    }

    if (!html) html = `<div style="padding:16px;font-size:13px;color:var(--color-text-secondary);text-align:center;">No buckets yet.<br>Create one to get started.</div>`
    container.innerHTML = html
    attachDragHandlers()
  }

  const handleFolderClick = (id) => {
    const expanded = isFolderExpanded(id)
    setFolderExpanded(id, !expanded)
    selectedItemId = id
    selectedItemType = 'folder'
    renderTree()
    renderDetail(id, 'folder')
  }

  // ── Drag and drop ─────────────────────────────────────────────────────────────
  const attachDragHandlers = () => {
    const tree = document.getElementById('bucket-tree')
    if (!tree) return

    // Bucket rows: draggable (not system)
    tree.querySelectorAll('.tree-bucket[data-bucket-id]').forEach(el => {
      const bucket = allBuckets.find(b => b.id === el.dataset.bucketId)
      if (!bucket || bucket.is_system) return
      el.draggable = true
      el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('bucketId', bucket.id)
        el.classList.add('dragging')
      })
      el.addEventListener('dragend', () => el.classList.remove('dragging'))
    })

    // Folder rows: drop targets
    tree.querySelectorAll('.tree-folder[data-folder-id]').forEach(el => {
      const folderId = el.dataset.folderId
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over') })
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'))
      el.addEventListener('drop', async e => {
        e.preventDefault()
        el.classList.remove('drag-over')
        const bucketId = e.dataTransfer.getData('bucketId')
        if (!bucketId) return
        await moveBucket(bucketId, folderId)
      })
    })

    // Tree background: drop to remove from folder
    tree.addEventListener('dragover', e => e.preventDefault())
    tree.addEventListener('drop', async e => {
      if (e.target.closest('.tree-folder')) return
      const bucketId = e.dataTransfer.getData('bucketId')
      if (!bucketId) return
      const bucket = allBuckets.find(b => b.id === bucketId)
      if (!bucket || !bucket.parent_id) return
      await moveBucket(bucketId, null)
    })
  }

  const moveBucket = async (bucketId, parentId) => {
    try {
      const res = await fetch(`/buckets/${bucketId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parent_id: parentId })
      })
      if (!res.ok) throw new Error((await res.json()).error || 'Move failed')
      await loadBuckets()
      toast.success('Moved', parentId ? 'Bucket moved into folder' : 'Bucket moved to top level')
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── Select + detail panel ─────────────────────────────────────────────────────
  const selectItem = (id, type) => {
    selectedItemId = id
    selectedItemType = type
    renderTree()
    renderDetail(id, type)
  }

  const renderDetail = (id, type) => {
    const item = allBuckets.find(b => b.id === id)
    if (!item) return
    const el = document.getElementById('bucket-detail')
    const folders = allBuckets.filter(b => b.is_folder && b.id !== id)
    const folderOpts = `<option value="">Top level (no folder)</option>` +
      folders.map(f => `<option value="${f.id}"${item.parent_id === f.id ? ' selected' : ''}>${esc(f.name)}</option>`).join('')

    if (type === 'folder') {
      const children  = allBuckets.filter(b => b.parent_id === id)
      const canDelete = children.length === 0
      el.innerHTML = `<div class="detail-card">
        <div class="detail-title">📂 Folder</div>
        <div class="form-group">
          <label>Folder Name</label>
          <input type="text" id="detail-name" value="${esc(item.name)}" style="width:100%;">
        </div>
        <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:${children.length ? '12px' : '0'};">
          ${children.length} bucket${children.length !== 1 ? 's' : ''} in this folder
        </div>
        ${children.length ? `<div style="margin-bottom:16px;">${children.map(b =>
          `<div class="bucket-child-row">
            <span style="width:10px;height:10px;border-radius:50%;background:${b.color};display:inline-block;flex-shrink:0;"></span>
            <span style="flex:1;">${esc(b.name)}</span>
            <span style="font-size:12px;color:var(--color-text-secondary);">${b.lead_count ?? 0} leads</span>
          </div>`).join('')}</div>` : ''}
        <div class="section-divider"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-primary btn-sm" onclick="saveDetailName('${id}','folder')">Save Name</button>
          ${canDelete
            ? `<button class="btn btn-danger btn-sm" onclick="deleteItem('${id}','folder')">Delete Folder</button>`
            : `<span style="font-size:12px;color:#9ca3af;">Move or delete all buckets before deleting this folder.</span>`}
        </div>
      </div>`

    } else {
      const swatches = BUCKET_COLORS.map(c =>
        `<div class="color-swatch${item.color === c ? ' selected' : ''}" style="background:${c};" onclick="updateItemColor('${id}','${c}',this)"></div>`
      ).join('')
      el.innerHTML = `<div class="detail-card">
        <div class="detail-title">📁 Bucket</div>
        <div class="form-group">
          <label>Bucket Name</label>
          <input type="text" id="detail-name" value="${esc(item.name)}" style="width:100%;" ${item.is_system ? 'disabled' : ''}>
        </div>
        ${!item.is_system ? `<div class="form-group">
          <label>Color</label>
          <div class="color-swatches">${swatches}</div>
        </div>` : ''}
        <div class="form-group">
          <label>Move to Folder</label>
          <select id="detail-folder" ${item.is_system ? 'disabled' : ''}>${folderOpts}</select>
        </div>
        <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;">${item.lead_count ?? 0} leads in this bucket</div>
        <div class="section-divider"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="/leads.html?bucket_id=${id}" class="btn btn-primary btn-sm">View Leads →</a>
          ${!item.is_system ? `<button class="btn btn-secondary btn-sm" onclick="saveDetailBucket('${id}')">Save Changes</button>` : ''}
          ${!item.is_system ? `<button class="btn btn-danger btn-sm" onclick="deleteItem('${id}','bucket')">Delete Bucket</button>` : ''}
        </div>
      </div>`
    }
  }

  // ── API helpers ───────────────────────────────────────────────────────────────
  const saveDetailName = async (id) => {
    const name = document.getElementById('detail-name')?.value.trim()
    if (!name) return toast.error('Error', 'Name is required')
    try {
      const res = await fetch(`/buckets/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Save failed')
      const idx = allBuckets.findIndex(b => b.id === id)
      if (idx >= 0) allBuckets[idx] = { ...allBuckets[idx], ...data.bucket }
      toast.success('Saved', 'Name updated')
      renderTree()
      renderDetail(id, 'folder')
    } catch (err) { toast.error('Error', err.message) }
  }

  const saveDetailBucket = async (id) => {
    const name     = document.getElementById('detail-name')?.value.trim()
    const parentId = document.getElementById('detail-folder')?.value || null
    if (!name) return toast.error('Error', 'Name is required')
    const item = allBuckets.find(b => b.id === id)
    try {
      const res = await fetch(`/buckets/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, color: item?.color, parent_id: parentId }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Save failed')
      const idx = allBuckets.findIndex(b => b.id === id)
      if (idx >= 0) allBuckets[idx] = { ...allBuckets[idx], ...data.bucket }
      toast.success('Saved', 'Bucket updated')
      renderTree()
      renderDetail(id, 'bucket')
    } catch (err) { toast.error('Error', err.message) }
  }

  const updateItemColor = async (id, color, swatchEl) => {
    try {
      const res = await fetch(`/buckets/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ color }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Save failed')
      const idx = allBuckets.findIndex(b => b.id === id)
      if (idx >= 0) allBuckets[idx] = { ...allBuckets[idx], ...data.bucket }
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'))
      swatchEl.classList.add('selected')
      renderTree()
      toast.success('Color saved', '')
    } catch (err) { toast.error('Error', err.message) }
  }

  const deleteItem = async (id, type) => {
    const item = allBuckets.find(b => b.id === id)
    if (!item) return
    if (!confirm(`Delete ${type} "${item.name}"?`)) return
    try {
      const res = await fetch(`/buckets/${id}`, { method:'DELETE' })
      if (!res.ok) throw new Error((await res.json()).error || 'Delete failed')
      allBuckets = allBuckets.filter(b => b.id !== id)
      if (type === 'folder') allBuckets.forEach(b => { if (b.parent_id === id) b.parent_id = null })
      selectedItemId = null
      selectedItemType = null
      renderTree()
      document.getElementById('bucket-detail').innerHTML = `<div class="buckets-empty"><div style="font-size:32px;">📂</div><div>Select a bucket or folder to view details</div></div>`
      toast.success('Deleted', `${type === 'folder' ? 'Folder' : 'Bucket'} removed`)
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── New Folder modal ──────────────────────────────────────────────────────────
  const openNewFolderModal  = () => { document.getElementById('new-folder-name').value = ''; document.getElementById('new-folder-modal').classList.add('open'); setTimeout(()=>document.getElementById('new-folder-name').focus(),50) }
  const closeNewFolderModal = () => document.getElementById('new-folder-modal').classList.remove('open')
  const saveNewFolder = async () => {
    const name = document.getElementById('new-folder-name').value.trim()
    if (!name) return toast.error('Error', 'Folder name is required')
    try {
      const res = await fetch('/buckets', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, is_folder:true, color:'#6366f1' }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Failed to create')
      data.bucket.lead_count = 0
      allBuckets.push(data.bucket)
      closeNewFolderModal()
      renderTree()
      selectItem(data.bucket.id, 'folder')
      toast.success('Folder created', name)
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── New Bucket modal ──────────────────────────────────────────────────────────
  const openNewBucketModal  = () => {
    document.getElementById('new-bucket-name').value = ''
    newBucketColor = BUCKET_COLORS[0]
    const folderSel = document.getElementById('new-bucket-folder')
    folderSel.innerHTML = '<option value="">Top level (no folder)</option>' +
      allBuckets.filter(b => b.is_folder).map(f => `<option value="${f.id}">${esc(f.name)}</option>`).join('')
    if (selectedItemType === 'folder') folderSel.value = selectedItemId
    document.getElementById('new-bucket-colors').innerHTML = BUCKET_COLORS.map(c =>
      `<div class="color-swatch${c === newBucketColor ? ' selected' : ''}" style="background:${c};" onclick="newBucketPickColor('${c}',this)"></div>`
    ).join('')
    document.getElementById('new-bucket-modal').classList.add('open')
    setTimeout(()=>document.getElementById('new-bucket-name').focus(),50)
  }
  const closeNewBucketModal = () => document.getElementById('new-bucket-modal').classList.remove('open')
  const newBucketPickColor  = (c, el) => {
    newBucketColor = c
    document.querySelectorAll('#new-bucket-colors .color-swatch').forEach(s => s.classList.remove('selected'))
    el.classList.add('selected')
  }
  const saveNewBucket = async () => {
    const name     = document.getElementById('new-bucket-name').value.trim()
    const parentId = document.getElementById('new-bucket-folder').value || null
    if (!name) return toast.error('Error', 'Bucket name is required')
    try {
      const res = await fetch('/buckets', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, color:newBucketColor, parent_id:parentId, is_folder:false }) })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Failed to create')
      data.bucket.lead_count = 0
      allBuckets.push(data.bucket)
      closeNewBucketModal()
      renderTree()
      selectItem(data.bucket.id, 'bucket')
      toast.success('Bucket created', name)
    } catch (err) { toast.error('Error', err.message) }
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  const init = async () => {
    renderSidebar()
    await loadProfile()
    await loadBuckets()
  }
  document.addEventListener('DOMContentLoaded', init)
</script>
</body>
</html>
